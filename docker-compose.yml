version: "3.9"

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: grafeno
      POSTGRES_USER: grafeno
      POSTGRES_PASSWORD: grafeno
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  api:
    build: .
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://grafeno:grafeno@db:5432/grafeno
    depends_on:
      - db

volumes:
  postgres_data:
